<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>एडमिन पैनल | स्कूल गैलरी अपलोडर</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; }
        .font-cinzel { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="antialiased p-3 md:p-8">

    <div class="max-w-4xl mx-auto flex flex-col gap-5">
        
        <div class="bg-[#1e3a8a] text-white p-5 rounded-2xl shadow-md flex flex-col md:flex-row items-center justify-between gap-3 text-center md:text-left">
            <div class="flex items-center space-x-3">
                <i class="fas fa-user-shield text-2xl text-amber-400"></i>
                <h1 class="font-cinzel font-bold text-xl tracking-wider">चतुर्भुज स्कूल - गैलरी मैनेजमेंट</h1>
            </div>
            <span class="bg-green-500 text-xs px-3 py-1 rounded-full font-bold animate-pulse inline-block shadow-sm">
                क्लाउड सिंक ऑन
            </span>
        </div>

        <div class="bg-amber-50 border-l-4 border-[#d97706] p-4 rounded-r-xl shadow-sm text-sm text-[#334155]">
            <p class="font-bold mb-1"><i class="fas fa-info-circle mr-1"></i> कैसे अपलोड करें:</p>
            <p>नीचे <span class="font-bold text-[#1e3a8a]">+ (प्लस)</span> बटन दबाएं, फोटो चुनें और ऊपर दाएँ कोने में दिख रहे <b>Publish</b> बटन पर क्लिक कर दें।</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden relative w-full" style="height: 70vh; min-height: 600px;">
            
            <iframe 
                src="https://padlet.com/gyanendrakumarmaurya22/padlet-bvfz4ndrbd6sk2xy?embed=1" 
                allow="camera;microphone;geolocation"
                class="absolute top-0 left-0 w-full h-full border-none"
                title="Upload Portal">
            </iframe>

            <div class="absolute top-0 left-0 w-full h-[55px] flex z-10">
                
                <div class="flex-grow h-full bg-[#fdfbf7] flex items-center px-4 pointer-events-auto border-b border-amber-200 shadow-sm">
                    <span class="font-cinzel font-bold text-[#1e3a8a] text-[16px] md:text-lg tracking-wider flex items-center">
                        <i class="fas fa-cloud-upload-alt mr-2 text-[#d97706]"></i> क्लाउड गैलरी
                    </span>
                </div>

                <div class="w-[90px] h-full bg-[#fdfbf7] flex items-center justify-center border-b border-amber-200 pointer-events-none shadow-sm">
                    
                    <div class="bg-pink-600 text-white px-3 py-1.5 rounded-md font-bold text-sm shadow-md pointer-events-none">
                        Publish
                    </div>

                </div>
            </div>

        </div>
        
        <div class="text-center mt-2 pb-6">
            <a href="index.html" class="inline-flex items-center text-sm text-[#1e3a8a] hover:text-[#d97706] hover:underline font-semibold transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> मुख्य वेबसाइट पर वापस जाएं
            </a>
        </div>

    </div>

</body>
</html>
