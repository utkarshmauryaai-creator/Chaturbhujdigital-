<!DOCTYPE html>
<html lang="hi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फोटो गैलरी | चतुर्भुज पब्लिक स्कूल</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #d97706;
            --background: #fdfbf7;
            --text: #334155;
        }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--background);
            color: var(--text);
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .glass-nav {
            background: rgba(253, 251, 247, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .chakra-spin { animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 border-b border-amber-200/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 md:h-20">
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-10 h-10 md:w-12 md:h-12 bg-[#1e3a8a] rounded-full flex items-center justify-center">
                        <i class="fas fa-dharmachakra text-white text-lg md:text-xl chakra-spin"></i>
                    </div>
                    <span class="font-cinzel font-bold text-lg md:text-xl text-[#1e3a8a]">चतुर्भुज स्कूल</span>
                </a>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="font-cinzel text-[#334155] hover:text-[#1e3a8a] transition-colors">होम</a>
                    <a href="biography.html" class="font-cinzel text-[#334155] hover:text-[#1e3a8a] transition-colors">हमारे बारे में</a>
                    <a href="legacy.html" class="font-cinzel text-[#334155] hover:text-[#1e3a8a] transition-colors">सुविधाएं</a>
                    <a href="gallery.html" class="font-cinzel text-[#1e3a8a] font-semibold border-b-2 border-[#d97706]">गैलरी</a>
                    <a href="#contact" class="font-cinzel text-[#334155] hover:text-[#1e3a8a] transition-colors">संपर्क</a>
                </div>

                <button id="mobile-menu-btn" class="md:hidden text-[#1e3a8a] text-2xl">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-[#fdfbf7] border-t border-amber-200/50">
            <div class="px-4 py-4 space-y-3">
                <a href="index.html" class="block font-cinzel text-[#334155] hover:text-[#1e3a8a] py-2">होम</a>
                <a href="biography.html" class="block font-cinzel text-[#334155] hover:text-[#1e3a8a] py-2">हमारे बारे में</a>
                <a href="legacy.html" class="block font-cinzel text-[#334155] hover:text-[#1e3a8a] py-2">सुविधाएं</a>
                <a href="gallery.html" class="block font-cinzel text-[#1e3a8a] font-semibold py-2">गैलरी</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-28 pb-12 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-10 fade-in">
                <span class="font-cinzel text-[#d97706] tracking-widest uppercase text-sm">क्लाउड गैलरी सिस्टम</span>
                <h1 class="font-cinzel text-3xl md:text-5xl font-bold text-[#1e3a8a] mt-4">
                    स्कूल की सुनहरी यादें
                </h1>
                <p class="text-[#334155] mt-4 max-w-2xl mx-auto">
                    हमारे स्कूल के कार्यक्रमों और दैनिक गतिविधियों की ताज़ा तस्वीरें
                </p>
                <div class="w-24 h-1 bg-[#d97706] mx-auto mt-6"></div>
            </div>

            <div class="fade-in bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden relative w-full" style="height: 75vh; min-height: 600px;">
                <iframe 
                    src="https://sites.google.com/view/cps-gallery-demo" 
                    class="absolute top-0 left-0 w-full h-full border-none"
                    title="CPS Dynamic Gallery">
                </iframe>
            </div>
        </div>
    </main>

    <footer class="bg-[#1e3a8a] text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left">
                <div class="mb-6 md:mb-0">
                    <div class="flex items-center justify-center md:justify-start space-x-3 mb-2">
                        <i class="fas fa-dharmachakra text-amber-400 text-xl"></i>
                        <span class="font-cinzel font-bold text-xl">चतुर्भुज पब्लिक स्कूल</span>
                    </div>
                    <p class="text-white/70 text-sm">भैंसाना, कुंडा, प्रतापगढ़ | सर्वाधिकार सुरक्षित © 2026</p>
                </div>
                <div class="flex space-x-4">
                    <a href="#" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-[#d97706] transition-colors"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-[#d97706] transition-colors"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = mobileMenuBtn.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // Scroll Animation
        const fadeElements = document.querySelectorAll('.fade-in');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        fadeElements.forEach(el => observer.observe(el));

        // Navbar Shadow on Scroll
        const nav = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) nav.classList.add('shadow-md');
            else nav.classList.remove('shadow-md');
        });
    </script>
</body>
</html>
